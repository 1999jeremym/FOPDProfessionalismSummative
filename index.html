    q:'What does the "Duty of Confidentiality" mean in professional nursing communication?',
    model:`<h4>Duty of Confidentiality (Module 1 / Module 2 / Module 5)</h4>
<p>The Duty of Confidentiality means a nurse must protect all private information about a health consumer and only share it when necessary for their care or required by law. The anonymity potentially afforded online is no excuse for breaching confidentiality.</p>
<ul>
  <li><strong>Keep patient information private</strong> — anything learned through your professional role must not be shared with people not involved in care. This applies online and in public spaces (hallways, lifts, cafeterias).</li>
  <li><strong>Need-to-know basis only</strong> — information is communicated only to health professionals who require it to provide safe, effective care.</li>
  <li><strong>Be aware of data harvesting</strong> — even a single carefully anonymised post can be linked to other information online that makes a patient identifiable. Privacy settings do not guarantee protection.</li>
  <li><strong>Follow legal and ethical requirements</strong> — Code of Conduct Principle 5 (respect health consumers' privacy and confidentiality), Privacy Act, and Health Information Privacy Code. Breaching confidentiality can result in complaints to the Nursing Council, Privacy Commissioner involvement, or civil legal action.</li>
</ul>`,
    tip:'Always name specific legislation: Privacy Act, Health Information Privacy Code, and Code of Conduct Principle 5 (respect health consumers\' privacy and confidentiality). Mention the NZNO 2019 guideline that "patients don\'t have to be named to be identifiable." Give a concrete example of where confidential communication is breached (social media, hallways). Link to Pou 3.1 from Module 6 (professional, ethical, legal and organisational policies for information).'
  },
  {
    id:'f4',
    q:'How should a nurse respond if asked to perform a task they do not feel competent to do?',
    model:`<h4>Responding to Tasks Beyond Competence — 5 Steps</h4>
<ul>
  <li><strong>1. Acknowledge and speak up early</strong> — Clearly state that you do not feel competent or confident to perform the task. This prevents unsafe practice and demonstrates accountability. The nurse is responsible for their own practice (Module 1 — Characteristics of the Professional Nurse).</li>
  <li><strong>2. Explain the reason professionally</strong> — State you have not been trained, assessed, or supervised in that skill yet. This aligns with the Code of Conduct value of integrity and HPCAA 2003 requirements for fitness to practise.</li>
  <li><strong>3. Seek guidance, supervision, or support</strong> — Ask for supervision while performing the task, additional teaching, or an opportunity to observe first. This shows commitment to learning while keeping patients safe, consistent with Benner's novice to expert model.</li>
  <li><strong>4. Ensure the task is completed safely by someone competent</strong> — If you cannot perform it safely, ensure a competent nurse or clinician takes over. This protects the patient and meets Code of Conduct Principle 4 (maintain health consumer trust by providing safe and competent care).</li>
  <li><strong>5. Reflect and plan to build competence</strong> — Arrange training or practice afterward to develop the skill. This supports ongoing professional development consistent with Pou 6.3 (continuous learning) and Pou 4.11 (works within limits of expertise) from the NCNZ Standards of Competence 2025 (Module 6).</li>
</ul>`,
    tip:'Link to Principle 4 (maintain health consumer trust by providing safe and competent care) and the value of Integrity. Mention HPCAA 2003 section 16 (fitness to practise) and Pou 4.11 (Module 6). Reference Benner\'s model — novice nurses are expected to practise rule-based care and seek guidance (Module 1). Balance patient safety with your development as a student nurse.'
  },
  {
    id:'f5',
    q:'What is the role of self-reflection in New Zealand nursing professionalism?',
    model:`<h4>Role of Self-Reflection in NZ Nursing Professionalism</h4>
<ul>
  <li><strong>1. Supports safe and accountable practice</strong> — Self-reflection helps nurses recognise their strengths and limitations, ensuring they practise within their competence and seek support when needed. This aligns with Pou 4.11 (works within limits of expertise) and Pou 6.5 (responds to risk) from the NCNZ Standards of Competence 2025 (Module 6).</li>
  <li><strong>2. Improves quality of care</strong> — By reflecting on what went well and what could be improved, nurses refine their clinical skills, communication and decision-making. This is consistent with Benner's model of moving from novice to expert through reflective practice (Module 1).</li>
  <li><strong>3. Enhances cultural safety</strong> — Reflection helps nurses examine their own biases, assumptions and cultural lens. This is essential for practising in a way that upholds mana, respects diversity, and aligns with Te Tiriti o Waitangi — foundational to Pou One (Māori Health) and Pou Two (Cultural Safety) (Module 6).</li>
  <li><strong>4. Strengthens professional identity and growth</strong> — Reflection is part of ongoing professional development (Pou 6.3). It helps nurses understand how their values, behaviours and experiences shape their practice. The professional nurse has a commitment to making a difference to people's health and wellbeing (Module 1).</li>
  <li><strong>5. Supports ethical and compassionate care</strong> — Encourages empathy, emotional awareness and integrity — all key Code of Conduct values. Caring is described as a mutually beneficial experience for both the patient and the nurse (Watson, 2008 — Module 1).</li>
</ul>`,
    tip:'Connect self-reflection to the Code of Conduct values (especially integrity), the six pou (especially Pou 6.3, Pou 1 and Pou 2), Benner\'s model, and Watson\'s theory of caring (Module 1). Self-reflection is a core professional requirement in Aotearoa, not just a personal exercise — it is embedded in the NCNZ competency standards (Module 6).'
  },
];
// ═══════════════════════════════════════════════════════════════════════════════
// SRS ENGINE
// ═══════════════════════════════════════════════════════════════════════════════

const SRS_MS = {again:0,hard:60000,good:180000,easy:420000};
function rateSRS(card,rating){
  const now=Date.now();
  return{...card,lastReview:now,nextReview:now+SRS_MS[rating],
    difficulty:rating==='again'?Math.min((card.difficulty||0)+1,5):Math.max((card.difficulty||0)-1,0),
    timesReviewed:(card.timesReviewed||0)+1,lastRating:rating};
}
function isDue(c){return !c.nextReview||c.nextReview<=Date.now()}

// ═══════════════════════════════════════════════════════════════════════════════
// APP STATE & RENDER
// ═══════════════════════════════════════════════════════════════════════════════

let state = {
  view:'home',
  cards: FLASHCARDS.map(c=>({...c,nextReview:null,lastReview:null,timesReviewed:0,lastRating:null})),
  filter:'all',
  fcIdx:0,
  currentCardId:null,
  flipped:false,
  openSection:null,
  quizAnswers:{},
  quizRevealed:{},
  fopdAnswers:{},
  fopdRevealed:{},
};

try {
  const saved = localStorage.getItem('fopd_srs');
  if(saved){
    const parsed = JSON.parse(saved);
    state.cards = state.cards.map(c => {
      const s = parsed.find(p => p.id === c.id);
      return s ? {...c,...s} : c;
    });
  }
} catch(e){}

try {
  const qa = localStorage.getItem('fopd_quiz_answers');
  if(qa) state.quizAnswers = JSON.parse(qa);
} catch(e){}

try {
  const fa = localStorage.getItem('fopd_fopd_answers');
  if(fa) state.fopdAnswers = JSON.parse(fa);
} catch(e){}

function saveSRS(){
  try{localStorage.setItem('fopd_srs',JSON.stringify(state.cards.map(c=>({id:c.id,nextReview:c.nextReview,lastReview:c.lastReview,timesReviewed:c.timesReviewed,lastRating:c.lastRating,difficulty:c.difficulty}))));}catch(e){}
}
function saveQuizAnswers(){
  try{localStorage.setItem('fopd_quiz_answers',JSON.stringify(state.quizAnswers));}catch(e){}
}
function saveFopdAnswers(){
  try{localStorage.setItem('fopd_fopd_answers',JSON.stringify(state.fopdAnswers));}catch(e){}
}

function setView(v){state.view=v;state.fcIdx=0;state.currentCardId=null;state.flipped=false;render();window.scrollTo(0,0);}
function setFilter(f){state.filter=f;state.fcIdx=0;state.currentCardId=null;state.flipped=false;render();}
function getDue(){return state.cards.filter(c=>isDue(c)&&(state.filter==='all'||c.lo===state.filter));}

function getThemeIcon(){
  return document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';
}

function render(){
  const app=document.getElementById('app');
  const due=getDue();
  const mastered=state.cards.filter(c=>c.lastRating==='easy'||c.lastRating==='good').length;
  const pct=Math.round((mastered/state.cards.length)*100);

  const themeBtn=`<button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">${getThemeIcon()}</button>`;

  if(state.view==='home'){
    app.innerHTML=`
      <div class="top-bar">
        <div class="brand">FOPD <em>Professionalism</em><small>Summative</small></div>
        <div class="nav-right">${themeBtn}</div>
      </div>
      <div class="hero">
        <div class="hero-label">BN1 Nursing · MIT</div>
        <h1>FOPD <em>Professionalism</em><br>Summative</h1>
        <p>Code of Conduct · Social Media · Confidentiality · Competence · Self-Reflection</p>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" style="color:var(--accent2)">${state.cards.length}</div><div class="stat-label">Cards</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${getDue().length>0?'var(--accent3)':'var(--accent)'}">${getDue().length}</div><div class="stat-label">Due Now</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${pct}%</div><div class="stat-label">Mastery</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--accent4)">${state.cards.filter(c=>c.timesReviewed>0).length}</div><div class="stat-label">Reviewed</div></div>
      </div>
      <div class="home-cards">
        <button class="home-card" onclick="setView('fopd')"><span class="icon">📝</span><div><div class="title" style="color:var(--accent4)">FOPD SAQ Practice</div><div class="desc">5 summative short-answer questions — model answers included</div></div></button>
        <button class="home-card" onclick="setView('flashcards')"><span class="icon">🃏</span><div><div class="title" style="color:var(--accent)">SRS Flashcards</div><div class="desc">${getDue().length} cards due for review — spaced repetition</div></div></button>
        <button class="home-card" onclick="setView('study')"><span class="icon">📖</span><div><div class="title" style="color:var(--accent2)">Study Guide</div><div class="desc">All topics with full detail — read and revise</div></div></button>
        <button class="home-card" onclick="setView('quiz')"><span class="icon">✍️</span><div><div class="title" style="color:var(--accent3)">Practice Questions</div><div class="desc">10 short-answer questions with model answers</div></div></button>
      </div>
    `;
    return;
  }

  // ── TOP BAR ──
  let topBar=`<div class="top-bar">
    <div class="brand" onclick="setView('home')">FOPD <em>Professionalism</em><small>Summative</small></div>
    <div class="nav-right">
      ${themeBtn}
      <div class="nav-pills">
        <button class="nav-pill ${state.view==='fopd'?'active':''}" onclick="setView('fopd')" style="${state.view==='fopd'?'':''}">SAQ</button>
        <button class="nav-pill ${state.view==='flashcards'?'active':''}" onclick="setView('flashcards')">Cards</button>
        <button class="nav-pill ${state.view==='study'?'active':''}" onclick="setView('study')">Study</button>
        <button class="nav-pill ${state.view==='quiz'?'active':''}" onclick="setView('quiz')">Quiz</button>
      </div>
    </div>
  </div>`;

  let filterBar=`<div class="filter-bar">
    ${['all','LO2','LO4','FOPD'].map(f=>`<button class="filter-btn ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${f==='all'?'All Topics':f}</button>`).join('')}
  </div>`;

  // ── FOPD SAQ VIEW ──
  if(state.view==='fopd'){
    app.innerHTML=topBar+`
      <div class="quiz-header"><h2 style="color:var(--accent4)">FOPD Summative SAQs</h2></div>
      <p class="quiz-intro">These are the five short-answer question topics from the FOPD Professionalism summative. Write your answer in the box, then reveal the model answer to compare. Aim for 4–6 sentences and link to the Code of Conduct values and relevant legislation. Your answers are saved automatically.</p>
      ${FOPD_SAQS.map((q,i)=>{
        const revealed=state.fopdRevealed[q.id];
        return `<div class="saq-card">
          <div class="saq-number">SAQ ${i+1} of ${FOPD_SAQS.length}</div>
          <div class="saq-q">${q.q}</div>
          <textarea class="saq-textarea" placeholder="Write your answer here…" oninput="state.fopdAnswers['${q.id}']=this.value;saveFopdAnswers()">${(state.fopdAnswers[q.id]||'').replace(/</g,'&lt;')}</textarea>
          <button class="saq-reveal ${revealed?'open':'closed'}" onclick="state.fopdRevealed['${q.id}']=!state.fopdRevealed['${q.id}'];render()">${revealed?'Hide':'Reveal'} Model Answer</button>
          ${revealed?`<div class="saq-model">
            <div class="saq-model-label">Model Answer</div>
            ${q.model}
            <div class="saq-tips">💡 <strong>Exam tip:</strong> ${q.tip}</div>
          </div>`:''}
        </div>`;
      }).join('')}
    `;
    return;
  }

  // ── FLASHCARDS VIEW ──
  if(state.view==='flashcards'){
    if(due.length===0){
      app.innerHTML=topBar+filterBar+`<div class="fc-header"><h2 style="color:var(--accent)">Flashcards</h2></div>
        <div class="done-box"><div class="done-emoji">🎉</div><div class="done-title">All caught up!</div><div class="done-desc">No cards due for review. Come back later or switch your filter.<br><br>Cards will become due again as time passes based on your confidence ratings.</div></div>`;
      return;
    }
    // Resolve current card by ID for stability; fall back to fcIdx
    let c = state.currentCardId ? due.find(x=>x.id===state.currentCardId) : null;
    if(!c){ c = due[Math.min(state.fcIdx,due.length-1)]; state.currentCardId=c.id; }
    const cardPos = due.findIndex(x=>x.id===c.id);
    if(cardPos>=0) state.fcIdx=cardPos;
    const tagClass=c.lo==='LO2'?'tag-lo2':c.lo==='LO4'?'tag-lo4':'tag-fopd';
    app.innerHTML=topBar+filterBar+`
      <div class="fc-header"><h2 style="color:var(--accent)">Flashcards</h2><span class="fc-counter">${state.fcIdx+1} / ${due.length}</span></div>
      <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${((state.fcIdx+1)/due.length)*100}%;background:var(--accent)"></div></div>
      <div class="card-wrap" onclick="state.flipped=!state.flipped;render()">
        <div class="card">
          <div class="card-tags"><span class="tag ${tagClass}">${c.lo}</span><span class="tag tag-topic">${c.topic}</span></div>
          <div class="card-side-label">${state.flipped?'Answer':'Question'}</div>
          ${state.flipped
            ?`<div class="card-back">${escHtml(c.back)}</div>`
            :`<div class="card-front">${escHtml(c.front)}</div><div class="card-hint">Tap to reveal answer</div>`}
        </div>
      </div>
      ${state.flipped?`<div class="rate-grid">
        <button class="rate-btn" style="border:1px solid rgba(232,93,93,.3)" onclick="rateCard('again')" onmouseenter="this.style.background='rgba(232,93,93,.12)'" onmouseleave="this.style.background='var(--surface)'"><div class="rate-label" style="color:var(--danger)">Again</div><div class="rate-sub">now</div></button>
        <button class="rate-btn" style="border:1px solid rgba(240,192,64,.3)" onclick="rateCard('hard')" onmouseenter="this.style.background='rgba(240,192,64,.12)'" onmouseleave="this.style.background='var(--surface)'"><div class="rate-label" style="color:var(--accent3)">Hard</div><div class="rate-sub">1 min</div></button>
        <button class="rate-btn" style="border:1px solid rgba(43,196,232,.3)" onclick="rateCard('good')" onmouseenter="this.style.background='rgba(43,196,232,.12)'" onmouseleave="this.style.background='var(--surface)'"><div class="rate-label" style="color:var(--accent2)">Good</div><div class="rate-sub">3 min</div></button>
        <button class="rate-btn" style="border:1px solid rgba(74,227,167,.3)" onclick="rateCard('easy')" onmouseenter="this.style.background='rgba(74,227,167,.12)'" onmouseleave="this.style.background='var(--surface)'"><div class="rate-label" style="color:var(--accent)">Easy</div><div class="rate-sub">7 min</div></button>
      </div>`:''}
    `;
    return;
  }

  // ── STUDY VIEW ──
  if(state.view==='study'){
    const filtered=STUDY_SECTIONS.filter(s=>state.filter==='all'||s.lo===state.filter);
    app.innerHTML=topBar+`
      <div class="study-header"><h2 style="color:var(--accent2)">Study Guide</h2></div>`+filterBar+`
      <div class="accordion">
        ${filtered.map(s=>{
          const isOpen=state.openSection===s.id;
          const tagC=s.lo==='LO2'?'tag-lo2':s.lo==='LO4'?'tag-lo4':'tag-fopd';
          return `<div>
            <button class="acc-trigger ${isOpen?'open':''}" onclick="state.openSection=state.openSection==='${s.id}'?null:'${s.id}';render()">
              <div style="display:flex;align-items:center"><span class="acc-lo tag ${tagC}">${s.lo}</span><span class="acc-title">${s.title}</span></div>
              <span class="acc-arrow ${isOpen?'open':''}">▾</span>
            </button>
            ${isOpen?`<div class="acc-body">${s.html}</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    return;
  }

  // ── QUIZ VIEW ──
  if(state.view==='quiz'){
    app.innerHTML=topBar+`
      <div class="quiz-header"><h2 style="color:var(--accent3)">Practice Questions</h2></div>
      <p class="quiz-intro">Write your answer in the text box, then reveal the model answer to compare. Aim for 4–6 sentences with specific references to the Code of Conduct, legislation, or competencies. Your answers are saved as you type.</p>
      ${QUIZ.map(q=>{
        const tagC=q.lo==='LO2'?'tag-lo2':'tag-lo4';
        const revealed=state.quizRevealed[q.id];
        return `<div class="q-card">
          <div class="q-tags"><span class="tag ${tagC}">${q.lo}</span><span class="tag" style="background:rgba(240,192,64,.1);color:var(--accent3)">Q${q.id}</span></div>
          <div class="q-text">${q.q}</div>
          <textarea class="q-textarea" placeholder="Write your answer here..." oninput="state.quizAnswers[${q.id}]=this.value;saveQuizAnswers()">${escHtml(state.quizAnswers[q.id]||'')}</textarea>
          <button class="reveal-btn ${revealed?'open':'closed'}" onclick="state.quizRevealed[${q.id}]=!state.quizRevealed[${q.id}];render()">${revealed?'Hide':'Reveal'} Model Answer</button>
          ${revealed?`<div class="model-box"><div class="model-label">Model Answer</div>${escHtml(q.model)}</div>`:''}
        </div>`;
      }).join('')}
    `;
    return;
  }
}

function rateCard(rating){
  const due=getDue();
  // Always use currentCardId to identify which card is being rated
  const c=state.currentCardId ? due.find(x=>x.id===state.currentCardId) : due[Math.min(state.fcIdx,due.length-1)];
  if(!c) return;
  const currentIdx=due.findIndex(x=>x.id===c.id);
  const updated=rateSRS(c,rating);
  state.cards=state.cards.map(x=>x.id===c.id?updated:x);
  state.flipped=false;
  saveSRS();
  // After rating, pick the next card in the pre-rating due list (skip the one just rated)
  const newDue=getDue();
  // Try to advance to what was next before rating
  const nextIdx=currentIdx; // same index now points to what was next card
  if(newDue.length===0){
    state.currentCardId=null;
    state.fcIdx=0;
  } else {
    const nextCard=newDue[Math.min(nextIdx,newDue.length-1)];
    state.currentCardId=nextCard.id;
    state.fcIdx=Math.min(nextIdx,newDue.length-1);
  }
  render();
}

function escHtml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Boot
render();
</script>
</body>
</html>
