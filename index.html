<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOPD Professionalism Summative</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ─── DARK THEME (default) ─── */
[data-theme="dark"]{
  --bg:#080c0a;--surface:#111916;--surface2:#182220;--surface3:#1f2d28;
  --accent:#4ae3a7;--accent2:#2bc4e8;--accent3:#f0c040;--accent4:#c084fc;
  --text:#e4ebe6;--text2:#7a9484;--text3:#4a6455;
  --danger:#e85d5d;--border:rgba(255,255,255,0.06);
  --toggle-bg:#182220;--shadow:rgba(0,0,0,0.4);
}

/* ─── LIGHT THEME ─── */
[data-theme="light"]{
  --bg:#f4f7f5;--surface:#ffffff;--surface2:#edf2ef;--surface3:#dde8e3;
  --accent:#1a9e6e;--accent2:#0e8aad;--accent3:#c08a00;--accent4:#8a44cc;
  --text:#111916;--text2:#4a6455;--text3:#7a9484;
  --danger:#c0392b;--border:rgba(0,0,0,0.08);
  --toggle-bg:#dde8e3;--shadow:rgba(0,0,0,0.1);
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',-apple-system,sans-serif;--radius:14px;
}

:root{
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',-apple-system,sans-serif;--radius:14px;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
button{font-family:var(--sans);cursor:pointer}
textarea{font-family:var(--sans)}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

.app{max-width:680px;margin:0 auto;padding:32px 20px 80px}

/* ─── NAV ─── */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;position:sticky;top:0;z-index:90;padding:12px 0;background:var(--bg);transition:background .25s}
.top-bar::after{content:'';position:absolute;bottom:-12px;left:-20px;right:-20px;height:12px;background:linear-gradient(var(--bg),transparent);pointer-events:none}
.brand{font-family:var(--serif);font-size:18px;color:var(--accent);cursor:pointer;line-height:1.2}
.brand em{color:var(--text);font-style:normal}
.brand small{display:block;font-size:10px;color:var(--text3);font-family:var(--sans);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-pills{display:flex;gap:4px;background:var(--surface);border-radius:99px;padding:3px;border:1px solid var(--border)}
.nav-pill{padding:7px 16px;border-radius:99px;border:none;font-size:12px;font-weight:600;letter-spacing:.5px;background:transparent;color:var(--text2);transition:all .2s}
.nav-pill.active{background:var(--accent);color:var(--bg)}
.nav-pill:hover:not(.active){color:var(--text)}

/* ─── THEME TOGGLE ─── */
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0}
.theme-toggle:hover{color:var(--accent);border-color:var(--accent);background:var(--surface2)}

/* ─── FILTER ─── */
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{padding:6px 18px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* ─── HOME ─── */
.hero{text-align:center;padding:48px 0 40px}
.hero-label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
.hero h1{font-family:var(--serif);font-size:46px;font-weight:400;line-height:1.05;margin-bottom:10px}
.hero h1 em{color:var(--accent);font-style:italic}
.hero p{color:var(--text2);font-size:14px;max-width:440px;margin:0 auto}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:18px 8px;text-align:center;border:1px solid var(--border);transition:border-color .2s}
.stat-card:hover{border-color:var(--surface3)}
.stat-val{font-size:26px;font-family:var(--serif)}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:4px}
.home-cards{display:flex;flex-direction:column;gap:10px}
.home-card{display:flex;align-items:center;gap:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;text-align:left;width:100%;transition:all .2s}
.home-card:hover{background:var(--surface2);border-color:var(--accent)}
.home-card .icon{font-size:30px;width:48px;text-align:center;flex-shrink:0}
.home-card .title{font-family:var(--serif);font-size:22px}
.home-card .desc{font-size:12px;color:var(--text2);margin-top:2px}

/* ─── FLASHCARD ─── */
.fc-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.fc-header h2{font-family:var(--serif);font-size:34px}
.fc-counter{color:var(--text2);font-size:13px}
.fc-progress-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden}
.fc-progress-fill{height:100%;border-radius:2px;transition:width .3s}
.card-wrap{cursor:pointer;margin-bottom:16px}
.card{background:var(--surface);border-radius:var(--radius);min-height:300px;padding:32px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--border);position:relative;transition:border-color .2s,background .25s}
.card:hover{border-color:var(--surface3)}
.card-tags{position:absolute;top:16px;left:20px;display:flex;gap:8px}
.tag{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:600;letter-spacing:.5px}
.tag-lo2{background:rgba(74,227,167,.12);color:var(--accent)}
.tag-lo4{background:rgba(43,196,232,.12);color:var(--accent2)}
.tag-fopd{background:rgba(192,132,252,.12);color:var(--accent4)}
.tag-topic{background:rgba(128,128,128,.08);color:var(--text2)}
.card-side-label{position:absolute;top:16px;right:20px;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.card-front{font-family:var(--serif);font-size:20px;line-height:1.5;margin-top:16px}
.card-back{font-size:14px;line-height:1.85;margin-top:16px;white-space:pre-line}
.card-hint{margin-top:20px;font-size:12px;color:var(--text3);text-align:center}
.rate-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rate-btn{background:var(--surface);border-radius:10px;padding:14px 6px;text-align:center;transition:all .15s;border:1px solid var(--border)}
.rate-btn:hover{transform:translateY(-1px)}
.rate-label{font-size:14px;font-weight:600}
.rate-sub{font-size:10px;color:var(--text2);margin-top:2px}
.done-box{background:var(--surface);border-radius:var(--radius);padding:52px 32px;text-align:center;border:1px solid var(--border)}
.done-emoji{font-size:52px;margin-bottom:16px}
.done-title{font-family:var(--serif);font-size:26px;color:var(--accent);margin-bottom:8px}
.done-desc{color:var(--text2);font-size:14px}

/* ─── STUDY ─── */
.study-header h2{font-family:var(--serif);font-size:34px;margin-bottom:16px}
.accordion{display:flex;flex-direction:column;gap:6px}
.acc-trigger{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);padding:18px 24px;text-align:left;transition:all .2s;font-size:15px}
.acc-trigger:hover{background:var(--surface2)}
.acc-trigger.open{background:var(--surface2);border-color:rgba(43,196,232,.2);border-radius:var(--radius) var(--radius) 0 0 !important}
.acc-trigger:not(.open){border-radius:var(--radius)}
.acc-lo{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:600;margin-right:12px}
.acc-title{font-family:var(--serif);font-size:19px;color:var(--text)}
.acc-arrow{color:var(--text2);font-size:16px;transition:transform .2s}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{background:var(--surface);border:1px solid var(--border);border-top:1px solid var(--surface2);border-radius:0 0 var(--radius) var(--radius);padding:28px 28px 32px;font-size:14px;line-height:1.9}
.acc-body h3{font-family:var(--serif);font-size:18px;color:var(--accent);margin:24px 0 10px}
.acc-body h3:first-child{margin-top:0}
.acc-body h4{font-size:14px;font-weight:700;color:var(--accent2);margin:18px 0 6px}
.acc-body p{margin:8px 0;color:var(--text)}
.acc-body .highlight{background:rgba(74,227,167,.08);border-left:3px solid var(--accent);padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-size:13px}
.acc-body .highlight strong{color:var(--accent)}
.acc-body .warn{background:rgba(240,192,64,.06);border-left:3px solid var(--accent3);padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-size:13px}
.acc-body ul{margin:6px 0 6px 8px;list-style:none}
.acc-body ul li{position:relative;padding-left:18px;margin:4px 0;font-size:14px}
.acc-body ul li::before{content:'•';position:absolute;left:0;color:var(--accent)}
.acc-body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.acc-body th{text-align:left;padding:10px 14px;background:var(--surface3);color:var(--accent);font-size:11px;text-transform:uppercase;letter-spacing:1px;border:1px solid var(--border)}
.acc-body td{padding:10px 14px;border:1px solid var(--border);vertical-align:top}
.acc-body .memory-aid{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.15);border-radius:10px;padding:14px 18px;margin:14px 0;font-size:13px;color:var(--accent4)}

/* ─── QUIZ ─── */
.quiz-header h2{font-family:var(--serif);font-size:34px;margin-bottom:6px}
.quiz-intro{color:var(--text2);font-size:13px;margin-bottom:28px;line-height:1.7}
.quiz-section-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin:28px 0 12px;padding:0 4px}
.q-card{background:var(--surface);border-radius:var(--radius);padding:28px;border:1px solid var(--border);margin-bottom:14px;transition:background .25s}
.q-tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.q-text{font-family:var(--serif);font-size:18px;line-height:1.4;margin-bottom:16px}
.q-textarea{width:100%;min-height:110px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:13px;line-height:1.7;resize:vertical;outline:none;transition:border-color .2s,background .25s}
.q-textarea:focus{border-color:rgba(240,192,64,.4)}
.q-textarea::placeholder{color:var(--text3)}
.reveal-btn{margin-top:12px;padding:8px 22px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s}
.reveal-btn.closed{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.reveal-btn.closed:hover{border-color:var(--accent3);color:var(--accent3)}
.reveal-btn.open{background:rgba(240,192,64,.1);border:1px solid var(--accent3);color:var(--accent3)}
.model-box{margin-top:14px;padding:18px;background:rgba(240,192,64,.04);border-radius:10px;border:1px solid rgba(240,192,64,.12);font-size:13px;line-height:1.85}
.model-label{font-size:10px;font-weight:700;color:var(--accent3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}

/* ─── FOPD SAQ QUIZ ─── */
.saq-card{background:var(--surface);border-radius:var(--radius);padding:28px;border:1px solid var(--border);margin-bottom:14px;transition:background .25s}
.saq-number{font-size:11px;font-weight:700;color:var(--accent4);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.saq-q{font-family:var(--serif);font-size:19px;line-height:1.4;margin-bottom:18px}
.saq-textarea{width:100%;min-height:130px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:13px;line-height:1.75;resize:vertical;outline:none;transition:border-color .2s}
.saq-textarea:focus{border-color:rgba(192,132,252,.4)}
.saq-textarea::placeholder{color:var(--text3)}
.saq-reveal{margin-top:12px;padding:9px 24px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s}
.saq-reveal.closed{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.saq-reveal.closed:hover{border-color:var(--accent4);color:var(--accent4)}
.saq-reveal.open{background:rgba(192,132,252,.1);border:1px solid var(--accent4);color:var(--accent4)}
.saq-model{margin-top:14px;padding:20px;background:rgba(192,132,252,.04);border-radius:10px;border:1px solid rgba(192,132,252,.12);font-size:13px;line-height:1.9}
.saq-model-label{font-size:10px;font-weight:700;color:var(--accent4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.saq-model h4{font-size:13px;font-weight:700;color:var(--accent2);margin:12px 0 5px}
.saq-model ul{margin:4px 0 4px 6px;list-style:none}
.saq-model ul li{position:relative;padding-left:16px;margin:3px 0}
.saq-model ul li::before{content:'•';position:absolute;left:0;color:var(--accent4)}
.saq-tips{margin-top:10px;padding:12px 16px;background:rgba(74,227,167,.06);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:12px;color:var(--text2)}
.saq-tips strong{color:var(--accent)}

@media(max-width:500px){
  .hero h1{font-size:36px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .rate-grid{grid-template-columns:repeat(2,1fr)}
  .nav-pills{gap:2px}
  .nav-pill{padding:6px 10px;font-size:11px}
  .brand{font-size:15px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// DARK / LIGHT MODE
// ═══════════════════════════════════════════════════════════════════════════════

function getTheme(){
  try{ return localStorage.getItem('fopd_theme')||'dark'; }catch(e){ return 'dark'; }
}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{ localStorage.setItem('fopd_theme',t); }catch(e){}
}
setTheme(getTheme());
function toggleTheme(){
  const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  setTheme(t);
  render();
}

// ═══════════════════════════════════════════════════════════════════════════════
// FLASHCARDS DATA
// ═══════════════════════════════════════════════════════════════════════════════

const FLASHCARDS = [
  // ── Module 1 & 2: Professionalism & Competence ──
  {id:1,lo:"LO2",topic:"Professionalism",front:"What is the NCNZ definition of competence? Break down its five components.",back:"Competence is the combination of SKILLS, KNOWLEDGE, ATTITUDES, VALUES and ABILITIES that underpin effective performance as a nurse (NCNZ, 2022).\n\nKNOWLEDGE — nursing knowledge, anatomy & physiology, social science, environmental science, behavioural science, pharmacology.\n\nSKILLS — communication is number one; also assessment skills and technological abilities.\n\nATTITUDES — caring and compassion is a highly valued attitude; caring is a mutually beneficial experience for both nurse and patient (Watson, 2008).\n\nVALUES — professional values: Respect, Trust, Partnership, Integrity (NCNZ).\n\nABILITIES — critical thinking, time management, leadership, willingness to learn."},
  {id:2,lo:"LO2",topic:"Professionalism",front:"What are the 8 most important characteristics of a professional nurse? (Module 1)",back:"1. COMPETENCE\n2. KNOWLEDGE\n3. CONSCIENTIOUSNESS\n4. INTEGRITY\n5. RESPECT\n6. EMOTIONAL INTELLIGENCE\n7. APPROPRIATENESS\n8. CONFIDENCE\n\nThese characteristics require nurturing and strengthening throughout your career.\n\nAdditional characteristics include: Caring, Communication, Empathy, Attention to detail, Problem solving skills, Stamina, Sense of Humour, Patient Advocacy, Willingness to learn, Critical thinking, Time management, Leadership."},
  {id:3,lo:"LO2",topic:"Professionalism",front:"What does professionalism mean in nursing? What does it imply about a person?",back:"Professionalism is demonstrating the PROFESSIONAL, LEGAL and ETHICAL STANDARDS required in practice.\n\nThis includes the knowledge, skills, values and attributes expected of the nursing profession.\n\nActing professionally implies the person is:\n• Conscientious in actions\n• Knowledgeable in the subject\n• Responsible to self and others\n• Integrates intellectual and professional standards into practice\n• Uses appropriate clinical judgement\n\nProfessional self-care is the awareness you have as a health professional to maintain professional boundaries and care for yourself effectively."},
  {id:4,lo:"LO2",topic:"Professionalism",front:"What is Benner's Novice to Expert model? Name all 5 stages.",back:"1. NOVICE — Beginner; rule-based practice\n\n2. ADVANCED BEGINNER — Principles based upon experience begin to be formulated to guide actions\n\n3. COMPETENT — Plans own actions based on analytic thinking; efficient and organised\n\n4. PROFICIENT — Holistic decision making; can modify plans based on experience\n\n5. EXPERT — Intuitive knowing in clinical decision situations; flexible, highly proficient performance\n\nAll PDRP (Professional Development Recognition Programme) is modelled on Benner's novice to expert model."},
  {id:5,lo:"LO2",topic:"Therapeutic Relationship",front:"What are the 4 components of the nurse-client relationship?",back:"POWER — the nurse holds knowledge and authority the client does not.\n\nTRUST — the client must feel safe in the nurse's care.\n\nRESPECT — valuing the client's dignity and individuality.\n\nPROFESSIONAL INTIMACY — access to personal and physical information about the client.\n\nThese four components are ALWAYS present, regardless of the context or length of the interaction (Module 2 / Module 5)."},
  {id:6,lo:"LO2",topic:"Therapeutic Relationship",front:"How does a therapeutic relationship differ from a social relationship? Name 5 differences.",back:"1. PURPOSE — Therapeutic = improve client's health outcomes. Social = mutual enjoyment.\n\n2. TIMEFRAME — Therapeutic = defined start and end (begins with care, ends at discharge or goals met). Social = ongoing, open-ended.\n\n3. FOCUS — Therapeutic = client's needs ONLY. Social = both parties' needs.\n\n4. BOUNDARIES — Therapeutic = strict professional boundaries maintained by the nurse. Social = informal.\n\n5. CONFIDENTIALITY — Therapeutic = legally and ethically required. Social = varied.\n\nAdditionally: POWER IMBALANCE exists in therapeutic relationships; the nurse holds more power."},
  {id:7,lo:"LO2",topic:"Therapeutic Relationship",front:"When does the therapeutic relationship end?",back:"The therapeutic relationship ends when:\n• The nursing care plan goals have been met, OR\n• The patient is discharged.\n\nEven when a nurse provides care to the same patient over several months or years (e.g. home care or long-term care), the nurse-patient relationship is STRUCTURED PROFESSIONALLY.\n\nThe relationship ends when the therapeutic relationship ends — not when the nurse's feelings change.\n\nThe nurse-patient relationship develops in the context of care provided and is goal-directed. (Module 2 / Module 5)"},
  {id:8,lo:"LO2",topic:"Professional Boundaries",front:"Define professional boundaries. Who is responsible for maintaining them?",back:"Professional boundaries are the SPACES BETWEEN THE NURSE'S POWER AND THE CLIENT'S VULNERABILITY.\n\nThe NURSE is ALWAYS responsible for establishing and maintaining appropriate boundaries, REGARDLESS of how a client behaves.\n\nSome boundaries are clear-cut. Others are less clear and require professional judgement. The nurse must recognise when a relationship is slipping into the non-professional realm and take IMMEDIATE action.\n\nBoundaries are imposed by ETHICAL, LEGAL and PROFESSIONAL standards of nursing. They protect patients from exploitation and nurses from professional misconduct. (Module 2 / Module 5)"},
  {id:9,lo:"LO2",topic:"Professional Boundaries",front:"What are the 3 zones of involvement? Describe each.",back:"1. UNDER-INVOLVEMENT — Disengaged, mechanically carrying out tasks, limiting health-related conversation, minimising a patient's suffering, being judgemental, avoiding the patient. Dehumanises the client and neglects holistic care.\n\n2. THERAPEUTIC ZONE (ideal) — Emotionally present but objective. Active listening for cues. Client-centred, goal-directed care. This is where safe, effective nursing happens.\n\n3. OVER-INVOLVEMENT — Loss of objectivity and emotional entanglement. The nurse's personal feelings interfere with professional judgement. Compromises safe care.\n\n(Module 2 / Module 5)"},
  {id:10,lo:"LO2",topic:"Professional Boundaries",front:"Give 4 examples of UNDER-involvement in nursing.",back:"1. Delaying care or treatment (e.g. waiting to answer a call bell, delaying PRN medication unnecessarily)\n\n2. Taking shortcuts in care (e.g. neglecting hand-washing, skipping a dressing change)\n\n3. Blaming the client for lack of progress\n\n4. Using disrespectful, demeaning, insulting, or humiliating language or tone\n\nOther examples: being unnecessarily rough when providing care; inadequately draping a client during a procedure; withholding information the client needs to make an informed decision; avoiding the client to a degree that interferes with meeting care needs.\n\n(Module 2 / Module 5)"},
  {id:11,lo:"LO2",topic:"Professional Boundaries",front:"Give 4 examples of OVER-involvement in nursing.",back:"1. Thinking about the client frequently when away from work\n\n2. Giving preferential care or time to the client, putting their needs above others\n\n3. Hiding your relationship with the client from others\n\n4. Spending breaks or time off with the client, seeking social contact, or providing personal information (e.g. email address or phone number)\n\nOther examples: feeling a sense of excitement, longing, romantic or sexual thoughts related to the client; refusing to transfer care to another provider when therapeutically indicated; participating in personal conversations, flirtation, or sexual innuendo.\n\n(Module 2 / Module 5)"},
  {id:12,lo:"LO2",topic:"Professional Boundaries",front:"What is a 'boundary crossing'? Give 2 examples.",back:"A BOUNDARY CROSSING is a brief excursion across professional lines of behaviour that may be inadvertent, thoughtless or even purposeful, while attempting to meet a special therapeutic need of the client.\n\nSome individual behaviours may appear harmless but when put together, form a pattern indicating a boundary has been crossed.\n\nExamples:\n1. Calling a client's family to access client information when the client did not want them involved.\n\n2. Driving a client to do their banking because you were going that way.\n\n(Module 2 / Module 5)"},
  {id:13,lo:"LO2",topic:"Professional Boundaries",front:"What is burnout in nursing? What causes it and what are its effects?",back:"BURNOUT occurs when a nurse is physically, emotionally and spiritually exhausted due to insufficient rest and self-care.\n\nSigns include: constant fatigue; feeling overworked or under-appreciated; lack of enthusiasm about work; compassion fatigue.\n\nEffects: impaired attention, memory, and decision making; decreased recall and attention to detail; poor patient care and compromised patient health outcomes.\n\nHow to prevent: mindfulness, supervision, exercise, diet, time management, maintaining family and friend networks, student groups.\n\n(Module 2 / Module 5)"},
  {id:14,lo:"LO4",topic:"Legislation",front:"What is the HPCAA 2003 and what does it require of the Nursing Council?",back:"HEALTH PRACTITIONERS COMPETENCE ASSURANCE ACT 2003 (HPCAA)\n\n• The overarching law governing ALL health professions in New Zealand\n• Requires the Nursing Council to set standards of competence and codes of conduct under SECTION 118(i)\n• Purpose: to PROTECT THE HEALTH AND SAFETY OF THE PUBLIC\n\nThe Nursing Council outlines the standards of ETHICAL CONDUCT under this Act.\n\nNursing students must also meet the criteria for fitness to practise found in SECTION 16 of the HPCAA. All candidates for registration must disclose criminal convictions.\n\n(Module 1 / Module 5)"},
  {id:15,lo:"LO4",topic:"Legislation",front:"Name 4 key pieces of legislation relevant to NZ nursing and social media conduct.",back:"1. HPCAA 2003 — governs all health professions; establishes NCNZ authority; sets standards of competence and ethical conduct\n\n2. PRIVACY ACT — protects personal information; ethical and legal obligation to maintain patient confidentiality\n\n3. HDC CODE OF HEALTH & DISABILITY SERVICES CONSUMERS' RIGHTS — 10 rights of health consumers\n\n4. HARMFUL DIGITAL COMMUNICATIONS ACT 2015 — sets 10 principles for digital communications; applies to texts, emails and online posts; provides processes if being harassed or bullied through social media\n\nAlso relevant: Employment Relations Act 2000 (clause 14 — freedom of expression; clause 17 — professional accountability)\n\n(Module 1 / Module 5)"},
  {id:16,lo:"LO4",topic:"HDC Code",front:"List ALL 10 rights of health consumers under the HDC Code.",back:"1. Right to be treated with RESPECT\n2. Right to freedom from DISCRIMINATION, coercion, harassment, and exploitation\n3. Right to DIGNITY and independence\n4. Right to services of an APPROPRIATE STANDARD\n5. Right to EFFECTIVE COMMUNICATION\n6. Right to be FULLY INFORMED\n7. Right to make an INFORMED CHOICE and give informed consent\n8. Right to SUPPORT\n9. Rights in respect of TEACHING or RESEARCH\n10. Right to COMPLAIN\n\nConsumers have rights and professionals have obligations.\n\n(Module 2 / Module 5)"},
  {id:17,lo:"LO4",topic:"NCNZ vs NZNO",front:"What is the difference between NCNZ and NZNO?",back:"NCNZ (NURSING COUNCIL OF NEW ZEALAND):\n• Regulatory body — statutory authority under HPCAA 2003\n• Purpose: PROTECT THE PUBLIC\n• Sets Code of Conduct, competencies, scopes of practice, guidelines on professional boundaries and social media\n• Power: can register, discipline, and deregister nurses\n\nNZNO (NZ NURSES ORGANISATION):\n• Professional body AND union\n• Purpose: ADVOCATE FOR NURSES\n• Publishes Code of Ethics and standards of practice (NZNO, 2012)\n• Membership is VOLUNTARY\n\nMemory aid: NCNZ = protects PUBLIC. NZNO = supports NURSES.\n\n(Module 1 / Module 5)"},
  {id:18,lo:"LO4",topic:"Code of Conduct",front:"What are the 4 core VALUES of the NCNZ Code of Conduct? Explain each.",back:"1. RESPECT — valuing the dignity, privacy, and individuality of every health consumer\n\n2. TRUST — acting in ways that maintain the public's confidence in nurses and the profession\n\n3. PARTNERSHIP — working alongside health consumers, whānau, and communities to support shared decision-making and culturally safe care\n\n4. INTEGRITY — being honest, accountable, and acting ethically in all professional interactions\n\nThese four values underpin the eight principles of the Code. What is personal and what is professional will inevitably overlap.\n\n(NCNZ, 2012 — Module 2 / Module 5)"},
  {id:19,lo:"LO4",topic:"Code of Conduct",front:"List ALL 8 principles of the NCNZ Code of Conduct.",back:"1. Respect the dignity and individuality of health consumers\n2. Respect the cultural needs and values of health consumers\n3. Work in partnership with health consumers to promote and protect their well-being\n4. Maintain health consumer trust by providing safe and competent care\n5. Respect health consumers' privacy and confidentiality\n6. Work respectfully with colleagues to best meet health consumers' needs\n7. Act with integrity to justify health consumers' trust\n8. Maintain public trust & confidence in the nursing profession\n\nAll 8 principles are of EQUAL IMPORTANCE and are based on the values underpinning professional conduct.\n\n(NCNZ, 2012 — Module 2 / Module 5)"},
  {id:20,lo:"LO4",topic:"Code of Conduct",front:"What are the 3 supporting guidelines published by NCNZ alongside the Code of Conduct?",back:"1. CODE OF CONDUCT (2012) — core standards of ethical conduct set under section 118(i) of the HPCAA; outlines standards of behaviour nurses are expected to uphold\n\n2. GUIDELINES: PROFESSIONAL BOUNDARIES (2012) — provides more detailed guidance on maintaining appropriate nurse-client boundaries; designed to be read alongside the Code\n\n3. GUIDELINES: SOCIAL MEDIA & ELECTRONIC COMMUNICATION (2012) — helps nurses navigate online conduct in relation to professional standards\n\nOf the 8 Code principles, FOUR directly intersect with the use of social media and electronic communications.\n\n(Module 2 / Module 5)"},
  {id:21,lo:"LO4",topic:"Social Media",front:"Name 6 key rules from the NZNO 2019 social media guidelines.",back:"1. You have an ethical and LEGAL obligation to maintain patient/client privacy and confidentiality at ALL times\n\n2. NEVER transmit by way of electronic media any patient-related image or information that may violate patient rights to confidentiality or privacy\n\n3. Do NOT identify patients by name or post information that may lead to identification — limiting access through privacy settings is NOT sufficient\n\n4. Maintain PROFESSIONAL BOUNDARIES in the use of electronic media — as with face-to-face relationships, the nurse has an obligation to establish, communicate and enforce professional boundaries online\n\n5. Promptly REPORT any breach of confidentiality or privacy\n\n6. Do NOT make disparaging comments about employers, co-workers, teachers or fellow students online\n\n(NZNO, 2019 — Module 1)"},
  {id:22,lo:"LO4",topic:"Social Media",front:"What is defamation? What are the 3 elements that make a statement defamatory?",back:"Defamation cases may be brought in a court of law against a nurse and are CIVIL CLAIMS in which substantial monetary compensation can be awarded.\n\nA defamatory statement is one that:\n1. Is PUBLISHED to a third person or group of people\n2. IDENTIFIES (or is about) a patient/client/colleague/person (the 'subject')\n3. DAMAGES THE REPUTATION of the subject\n\nExample: A nursing student made a 'flippant' Facebook comment suggesting a lecturer had been drunk while marking. The lecturer and institution were clearly identifiable. This constituted defamation.\n\nThe NZNO Standards of Nursing Practice specify nurses are responsible for maintaining professional relationships with colleagues and employers.\n\n(Module 1)"},
  {id:23,lo:"LO4",topic:"Social Media",front:"What are the 10 principles of the Harmful Digital Communications Act 2015?",back:"The Act sets out 10 principles for digital communications (texts, emails, online posts) — they should NOT:\n\n1. Give out sensitive personal information\n2. Be threatening, intimidating or menacing\n3. Be grossly offensive (judged by a reasonable person)\n4. Be indecent or obscene\n5. Be used to harass\n6. Make false claims\n7. Contain information given in confidence\n8. Encourage others to send harmful messages\n9. Encourage self-harm\n10. Put down (denigrate) someone based on colour, race, ethnicity, religion, gender, sexual orientation or disability\n\nNetSafe is the complaints agency under this Act.\n\n(Ministry of Justice, 2015 — Module 1)"},
  {id:24,lo:"LO4",topic:"Social Media",front:"Give a real-world example of professional misconduct via social media in nursing.",back:"EXAMPLE (NZNO Guideline, Module 1):\nCanadian nurse Carolyn Strom was disciplined and fined by the Saskatchewan Registered Nurses Association (SRNA) after a 2015 Facebook post criticising the end-of-life care her grandfather received. She was on parental leave and the post was on her personal page. The SRNA found her guilty of professional misconduct and fined her $1,000 plus ordered her to pay $25,000 in hearing costs. Her appeal in 2018 was upheld by the provincial court.\n\nKEY LESSON: Traditional expectations of professional conduct still apply in non-traditional online contexts. Nursing students and nurses always have a duty to patients and the community to maintain professional standards, including when using social media."},
  {id:25,lo:"LO4",topic:"Competence",front:"What should a nurse do if asked to perform a task beyond their competence? List 5 steps.",back:"1. SPEAK UP EARLY — clearly state you don't feel competent or confident; prevents unsafe practice and shows accountability\n\n2. EXPLAIN PROFESSIONALLY — 'I haven't been trained, assessed, or supervised in this skill yet' (aligns with integrity)\n\n3. SEEK SUPPORT — ask for supervision while performing the task, additional teaching, or opportunity to observe first\n\n4. ENSURE SAFE CARE — if you can't perform safely, make sure a competent nurse or clinician takes over (protects the patient; meets legal and ethical obligations)\n\n5. REFLECT & PLAN — arrange training or practice afterward to develop the skill (supports ongoing professional development)\n\nLinks to PRINCIPLE 4 (safe, competent care) and the value of INTEGRITY."},
  // ── Module 6: Six Pou — RN Competencies ──
  {id:26,lo:"LO2",topic:"Six Pou",front:"What are the six pou of the NCNZ RN Standards of Competence 2025?",back:"1. POU ONE — Māori Health\n2. POU TWO — Cultural Safety\n3. POU THREE — Whanaungatanga and Communication\n4. POU FOUR — Pūkengatanga and Evidence-Informed Nursing Practice\n5. POU FIVE — Manaakitanga and People-Centred Care\n6. POU SIX — Rangatiratanga and Leadership\n\nEach pou has a set of DESCRIPTORS which provides further depth and detail. Each pou is INTERRELATED and demonstrated in practice simultaneously.\n\nEvidence of safety to practise as a registered nurse is demonstrated when all six pou are met.\n\n(NCNZ Standards of Competence 2025 — Module 6)"},
  {id:27,lo:"LO2",topic:"Six Pou",front:"What are the 4 descriptors of Pou One (Māori Health)?",back:"POU ONE — MĀORI HEALTH: Reflecting a commitment to Māori health, registered nurses support, respect and protect Māori rights while advocating for equitable and positive health outcomes. Nurses must also demonstrate kawa whakaruruhau by addressing power imbalances and working collaboratively with Māori.\n\n1.1 — Engages in ongoing professional development related to Māori health and the relevance of Te Tiriti o Waitangi articles and principles\n\n1.2 — Advocates for health equity for Māori in all situations and contexts\n\n1.3 — Understands the impact of social determinants, such as colonisation, on health and wellbeing\n\n1.4 — Uses te reo and incorporates tikanga Māori into practice where appropriate\n\n(Module 6)"},
  {id:28,lo:"LO2",topic:"Six Pou",front:"What are the 5 descriptors of Pou Two (Cultural Safety)?",back:"POU TWO — CULTURAL SAFETY: Ensures registered nurses provide culturally safe care that is inclusive, responsive and equitable. Requires nurses to reflect on their practice, understand their cultural identity and the power imbalances between the nurse and the recipient of care.\n\n2.1 — Practises culturally safe care which is determined by the recipient\n2.2 — Challenges racism and discrimination in the delivery of nursing and health care\n2.3 — Engages in partnership with individuals, whānau and communities for the provision of health care\n2.4 — Advocates for individuals and whānau by including their cultural, spiritual, physical and mental health when providing care\n2.5 — Contributes to a collaborative team culture which respects diversity, including intersectional identities\n\n(Module 6)"},
  {id:29,lo:"LO2",topic:"Six Pou",front:"What does Pou Four (Pūkengatanga) require of RNs? Name 4 key descriptors.",back:"POU FOUR — PŪKENGATANGA AND EVIDENCE-INFORMED NURSING PRACTICE: Requires RNs to use clinical skills, coupled with critical thinking and informed by high quality and current evidence, to provide quality, safe nursing care. Evidence-informed practice prepares the nurse to differentially diagnose, plan care, identify appropriate interventions, lead the implementation and evaluate care provision and outcomes.\n\n4.2 — Develops differential diagnoses based on comprehensive assessment, clinical expertise and current evidence\n4.5 — Safely manages medicines based on pharmacotherapeutic knowledge\n4.9 — Applies infection prevention and control principles\n4.11 — Understands and works within the limits of expertise and seeks guidance to ensure safe practice\n\n(Module 6)"},
  {id:30,lo:"LO2",topic:"Six Pou",front:"What does Pou Six (Rangatiratanga and Leadership) require? List all 6 descriptors.",back:"POU SIX — RANGATIRATANGA AND LEADERSHIP: Demonstrated when nurses proactively provide solutions and lead innovation to improve the provision of care. Requires nurses to intervene, speak out, and advocate to escalate concerns on behalf of colleagues or recipients of care.\n\n6.1 — Actively contributes to a collaborative team culture of respect, support and trust\n6.2 — Demonstrates professional and ethical accountabilities and adheres to the NCNZ Code of Conduct, relevant legislation and organisational policies\n6.3 — Understands continuous learning and proactively seeks opportunities for professional development\n6.4 — Engages in quality improvement activities\n6.5 — Identifies and responds appropriately to risk impacting health, safety and wellbeing of self and others\n6.6 — Understands the impact of healthcare provision on global and local resources\n\n(Module 6)"},
  {id:31,lo:"LO2",topic:"Six Pou",front:"What is kawa whakaruruhau and how does it differ from whakapapa-centred care?",back:"KAWA WHAKARURUHAU = cultural safety in the Māori context within nursing. It ensures care is respectful and responsive to the cultural needs and identities of Māori. It means providing an environment where Māori feel safe, respected and understood, without fear of discrimination. It requires nurses to reflect on their OWN discrimination and bias and the impact that this has on recipients of care.\n\nWHAKAPAPA-CENTRED CARE = care that acknowledges a person's heritage, family connections and identity. It goes beyond treating physical symptoms to incorporate a deeper understanding of the individual's background, values and relationships, particularly for Māori. Emphasises connections to family and ancestors as central to well-being.\n\n(Module 6 — NCNZ 2025)"},
  {id:32,lo:"LO2",topic:"Self-Reflection",front:"What is professional self-care? Why is it important for nurses?",back:"Professional self-care is the AWARENESS you have as a health professional to maintain professional boundaries and care for yourself effectively.\n\nIt requires knowing yourself — your strengths and weaknesses — and being able to ask for help and support.\n\nBURNOUT is an occupational hazard for nurses.\n\nStrategies for professional self-care:\n• Mindfulness and supervision\n• Exercise, diet and time management\n• Maintaining family and friends; student groups/buddies\n• Debriefing with colleagues after highly emotional events\n• Seeking support when you feel uncomfortable about any aspect of the nurse-patient relationship\n\n(Module 1 — Introduction to Professionalism)"},
  {id:33,lo:"FOPD",topic:"Code of Conduct",front:"What are the 4 core values of the NCNZ Code of Conduct?",back:"1. RESPECT — valuing the dignity, privacy, and individuality of every health consumer\n2. TRUST — acting in ways that maintain the public's confidence in nurses and the profession\n3. PARTNERSHIP — working alongside health consumers, whānau, and communities for shared decision-making and culturally safe care\n4. INTEGRITY — being honest, accountable, and acting ethically in all professional interactions\n\nThese four values underpin all eight principles of the Code. (NCNZ, 2012 — Module 2 / Module 5)"},
  {id:34,lo:"FOPD",topic:"Social Media",front:"Why must a nurse maintain professional boundaries on social media? Give 4 reasons.",back:"1. PROTECT PATIENT PRIVACY & CONFIDENTIALITY — patients don't have to be named to be identifiable; even vague comments can breach the Privacy Act; deleted content may remain accessible\n\n2. UPHOLD PUBLIC TRUST IN THE PROFESSION — nurses are always seen as nurses, on and off duty; unprofessional posts damage confidence even from 'private' accounts\n\n3. AVOID BLURRING PERSONAL AND PROFESSIONAL ROLES — connecting with patients online creates dual relationships risking over-involvement or inappropriate familiarity; boundary violations can result in disciplinary action\n\n4. MAINTAIN SAFE, ETHICAL, CULTURALLY RESPECTFUL PRACTICE — posts can be misinterpreted; nurse has an obligation to establish and enforce professional boundaries in the online environment\n\n(NZNO, 2019 — Module 1)"},
  {id:35,lo:"FOPD",topic:"Confidentiality",front:"What does the Duty of Confidentiality mean in professional nursing?",back:"A nurse must PROTECT ALL PRIVATE INFORMATION about a health consumer and only share it when:\n• NECESSARY FOR CARE (need-to-know basis), OR\n• REQUIRED BY LAW\n\nIn practice:\n1. Keep patient info private — anything learned through your role must not be shared with uninvolved parties\n2. Share only with health professionals who need it to provide safe, effective care\n3. Be careful about WHERE you discuss patients — NOT in hallways, lifts, cafeterias, or online\n4. Follow the Code of Conduct, Privacy Act, and Health Information Privacy Code\n\nBreaching confidentiality erodes public trust in the nursing profession and can result in complaints to the Nursing Council, Privacy Commissioner involvement, or legal action.\n\n(Module 1 / Module 2 / Module 5)"},
  {id:36,lo:"FOPD",topic:"Self-Reflection",front:"What is the role of self-reflection in NZ nursing professionalism?",back:"Self-reflection is embedded in NCNZ competency standards — it is a core professional requirement, not just a personal exercise.\n\n1. SUPPORTS SAFE, ACCOUNTABLE PRACTICE — helps recognise strengths and limitations; ensures practice within competence (links to Pou 6.3 and Pou 4.11)\n\n2. IMPROVES QUALITY OF CARE — refines clinical skills, communication, and decision-making\n\n3. ENHANCES CULTURAL SAFETY — helps examine own biases, assumptions, and cultural lens; essential for upholding mana and respecting diversity; aligns with Te Tiriti o Waitangi (Pou 1 and Pou 2)\n\n4. STRENGTHENS PROFESSIONAL IDENTITY — part of ongoing professional development; understanding how values and experiences shape practice\n\n5. SUPPORTS ETHICAL, COMPASSIONATE CARE — encourages empathy, emotional awareness, and integrity (Code of Conduct values)\n\n(Module 1 / Module 6)"},
];

  {id:"professionalism",title:"Professionalism & the Professional Nurse",lo:"LO2",html:`
<h3>What Is Professionalism?</h3>
<p>Professionalism is demonstrating the <strong>professional, legal and ethical standards</strong> required in practice. This includes the knowledge, skills, values and attributes expected of the nursing profession (Module 1).</p>
<div class="highlight"><strong>Acting professionally implies:</strong> the person is conscientious in actions, knowledgeable in the subject, responsible to self and others, integrates intellectual and professional standards into practice, and uses appropriate clinical judgement.</div>
<h4>NCNZ Definition of Competence (2022)</h4>
<p>Competence is the combination of <strong>skills, knowledge, attitudes, values and abilities</strong> that underpin effective performance as a nurse.</p>
<table>
  <tr><th>Component</th><th>What it includes</th></tr>
  <tr><td>Knowledge</td><td>Nursing knowledge, anatomy & physiology, social science, environmental science, behavioural science, pharmacology</td></tr>
  <tr><td>Skills</td><td>Communication (number one), assessment skills, technological abilities. Hindrances include pre-occupation with personal affairs, making assumptions, stereotypes</td></tr>
  <tr><td>Attitudes</td><td>Caring and compassion — caring is a mutually beneficial experience for nurse and patient (Watson, 2008)</td></tr>
  <tr><td>Values</td><td>Respect, Trust, Partnership, Integrity (professional values — NCNZ). Note: conflict can arise between personal and professional values</td></tr>
  <tr><td>Abilities</td><td>Critical thinking, time management, leadership, willingness to learn</td></tr>
</table>
<h4>8 Core Characteristics of the Professional Nurse</h4>
<ul>
  <li><strong>Competence · Knowledge · Conscientiousness · Integrity</strong></li>
  <li><strong>Respect · Emotional Intelligence · Appropriateness · Confidence</strong></li>
</ul>
<p>Additional important characteristics: Caring, Communication, Empathy, Attention to detail, Problem solving, Stamina, Sense of Humour, Patient Advocacy, Willingness to learn, Critical thinking, Time management, Leadership.</p>
<h4>Benner's Novice to Expert Model</h4>
<table>
  <tr><th>Stage</th><th>Description</th></tr>
  <tr><td>1 — Novice</td><td>Beginner; rule-based practice</td></tr>
  <tr><td>2 — Advanced Beginner</td><td>Principles based on experience begin to guide actions</td></tr>
  <tr><td>3 — Competent</td><td>Plans actions based on analytic thinking; efficient and organised</td></tr>
  <tr><td>4 — Proficient</td><td>Holistic decision making; can modify plans based on experience</td></tr>
  <tr><td>5 — Expert</td><td>Intuitive knowing in clinical decisions; flexible, highly proficient</td></tr>
</table>
<p>All PDRP (Professional Development Recognition Programme) is modelled on Benner's novice to expert model.</p>
<h4>Professional Self-Care</h4>
<p>Professional self-care is the awareness you have as a health professional to maintain professional boundaries and care for yourself effectively. You need to know your strengths and weaknesses and be able to ask for help and support. <strong>Burnout is an occupational hazard.</strong></p>
<ul>
  <li>Mindfulness, supervision, exercise, diet, time management</li>
  <li>Family and friends, student groups/buddies</li>
  <li>Debrief with colleagues after highly emotional shifts</li>
</ul>
`},
  {id:"therapeutic",title:"Therapeutic Relationships & Professional Boundaries",lo:"LO2",html:`
<h3>The Therapeutic Relationship</h3>
<p>The therapeutic relationship is the professional nurse-client relationship. It is fundamentally different from a social relationship.</p>
<h4>Four Components (always present — regardless of context or length of interaction)</h4>
<ul>
  <li><strong>Power</strong> — the nurse has knowledge and authority the client does not</li>
  <li><strong>Trust</strong> — the client must feel safe in the nurse's care</li>
  <li><strong>Respect</strong> — valuing the client's dignity and individuality</li>
  <li><strong>Professional Intimacy</strong> — access to personal and physical information</li>
</ul>
<h4>Therapeutic vs Social Relationship</h4>
<table>
  <tr><th>Feature</th><th>Social Relationship</th><th>Therapeutic Relationship</th></tr>
  <tr><td>Purpose</td><td>Mutual enjoyment</td><td>Client health outcomes</td></tr>
  <tr><td>Timeframe</td><td>Ongoing, open-ended</td><td>Defined start and end</td></tr>
  <tr><td>Focus</td><td>Both parties' needs</td><td>Client's needs only</td></tr>
  <tr><td>Boundaries</td><td>Informal</td><td>Strict professional boundaries</td></tr>
  <tr><td>Confidentiality</td><td>Varied</td><td>Legally and ethically required</td></tr>
  <tr><td>Power</td><td>Relatively equal</td><td>Nurse holds more power</td></tr>
</table>
<div class="warn">⚠️ The nurse-patient relationship ends when the therapeutic relationship ends — when goals are met or the patient is discharged.</div>
<h3>Professional Boundaries</h3>
<p>Professional boundaries are the <strong>spaces between the nurse's power and the client's vulnerability</strong>. They are imposed by ethical, legal and professional standards of nursing.</p>
<div class="highlight"><strong>Key rule:</strong> The nurse is ALWAYS responsible for establishing and maintaining boundaries, regardless of how a client behaves.</div>
<h4>Three Zones of Involvement</h4>
<table>
  <tr><th>Zone</th><th>Description</th><th>Problem</th></tr>
  <tr><td>Under-involvement</td><td>Disengaged; mechanically carrying out tasks</td><td>Neglects holistic care; dehumanises the client</td></tr>
  <tr><td>Therapeutic zone ✓</td><td>Emotionally present but objective; active listening</td><td>This is the IDEAL</td></tr>
  <tr><td>Over-involvement</td><td>Loss of objectivity; emotional entanglement</td><td>Compromises safe care and clinical judgement</td></tr>
</table>
<h4>Examples of Under-Involvement</h4>
<ul>
  <li>Delaying care (e.g. not answering a call bell, delaying PRN medication)</li>
  <li>Taking shortcuts (e.g. skipping hand-washing or a dressing change)</li>
  <li>Blaming the client for lack of progress</li>
  <li>Using disrespectful, demeaning, insulting, or humiliating language or tone</li>
  <li>Withholding information the client needs to make an informed decision</li>
</ul>
<h4>Examples of Over-Involvement</h4>
<ul>
  <li>Thinking about the client frequently when away from work</li>
  <li>Giving preferential care or time to the client</li>
  <li>Hiding your relationship with the client from others</li>
  <li>Spending breaks or time off with the client; providing personal contact details</li>
  <li>Feeling excitement, longing, romantic or sexual thoughts related to the client</li>
  <li>Refusing to transfer care when therapeutically indicated</li>
</ul>
<h4>NCNZ Disciplinary Action — Real Cases (Module 2 / Module 5)</h4>
<ul>
  <li>Mrs A had her registration suspended for 6 months and was subject to clinical supervision on return to practice, after becoming entangled in financial affairs of a patient.</li>
  <li>Mr S was suspended for 12 months, censured and had conditions placed on his scope of practice after entering into a sexual relationship with the estranged wife of a patient.</li>
  <li>Prison nurse provided accommodation for an ex-prisoner who had recently been under her care — found guilty of professional misconduct due to the prisoner's vulnerability.</li>
</ul>
<div class="warn">⚠️ <strong>Short-answer tip:</strong> Always link boundary violations to the patient's vulnerability and the nurse's power. Reference specific Code of Conduct principles (especially principles 1, 4, 7, 8).</div>
`},
  {id:"cultural",title:"Cultural Safety, Te Tiriti & Six Pou",lo:"LO2",html:`
<h3>Cultural Safety</h3>
<p>Cultural safety ensures that registered nurses provide culturally safe care that is inclusive, responsive and equitable. This requires nurses to reflect on their practice, understand their cultural identity and the power imbalances between the nurse and the recipient of care. (NCNZ Standards of Competence 2025 — Module 6)</p>
<h4>Kawa Whakaruruhau vs Whakapapa-Centred Care</h4>
<table>
  <tr><th>Concept</th><th>Meaning</th></tr>
  <tr><td><strong>Kawa whakaruruhau</strong></td><td>Cultural safety in the Māori context. Ensures care is respectful and responsive to the cultural needs and identities of Māori. Provides an environment where Māori feel safe, respected and understood without fear of discrimination. Requires nurses to reflect on their own discrimination and bias.</td></tr>
  <tr><td><strong>Whakapapa-centred care</strong></td><td>Care that acknowledges a person's heritage, family connections and identity. Goes beyond treating physical symptoms to incorporate a deeper understanding of the individual's background, values and relationships, particularly for Māori. Emphasises connections to family and ancestors as central to well-being.</td></tr>
</table>
<h3>The Six Pou — NCNZ RN Standards of Competence 2025</h3>
<p>There are six pou (standards) for the registered nurse standards of competence. Each pou is interrelated and demonstrated in practice simultaneously. (Module 6)</p>
<h4>Pou One — Māori Health</h4>
<ul>
  <li>1.1 Engages in ongoing PD related to Māori health and Te Tiriti o Waitangi</li>
  <li>1.2 Advocates for health equity for Māori in all situations and contexts</li>
  <li>1.3 Understands the impact of social determinants (e.g. colonisation) on health</li>
  <li>1.4 Uses te reo and incorporates tikanga Māori where appropriate</li>
</ul>
<h4>Pou Two — Cultural Safety</h4>

  {id:"legislation",title:"Legislation, HDC Code & NCNZ vs NZNO",lo:"LO4",html:`

<table>

  {id:"code",title:"NCNZ Code of Conduct",lo:"LO4",html:`
<h3>Four Core Values (NCNZ Code of Conduct 2012)</h3>
<ul>
  <li><strong>Respect</strong> — valuing the dignity, privacy, and individuality of every health consumer</li>
  <li><strong>Trust</strong> — acting in ways that maintain the public's confidence in nurses and the profession</li>
  <li><strong>Partnership</strong> — working alongside health consumers, whānau, and communities to support shared decision-making and culturally safe care</li>
  <li><strong>Integrity</strong> — being honest, accountable, and acting ethically in all professional interactions</li>
</ul>
<div class="highlight"><strong>Key point:</strong> Without the public's trust and confidence in the profession, nurses cannot fulfil their role effectively. This means that what is personal and what is professional will inevitably overlap.</div>
<h3>Eight Principles</h3>
<table>
  <tr><th>#</th><th>Principle</th></tr>
  <tr><td>1</td><td>Respect the dignity and individuality of health consumers</td></tr>
  <tr><td>2</td><td>Respect the cultural needs and values of health consumers</td></tr>
  <tr><td>3</td><td>Work in partnership with health consumers to promote and protect their well-being</td></tr>
  <tr><td>4</td><td>Maintain health consumer trust by providing safe and competent care</td></tr>
  <tr><td>5</td><td>Respect health consumers' privacy and confidentiality</td></tr>
  <tr><td>6</td><td>Work respectfully with colleagues to best meet health consumers' needs</td></tr>
  <tr><td>7</td><td>Act with integrity to justify health consumers' trust</td></tr>
  <tr><td>8</td><td>Maintain public trust &amp; confidence in the nursing profession</td></tr>
</table>
<p>Eight principles with standards form the framework for the code. These principles are based on the values underpinning professional conduct and are of <strong>equal importance</strong>.</p>
<div class="memory-aid">💡 <strong>Memory aid:</strong> Principles 1–2 = Respect (dignity/individuality · cultural needs/values) · Principle 3 = Partnership (promote & protect well-being) · Principle 4 = Safe & competent care · Principle 5 = Privacy & confidentiality · Principle 6 = Colleagues · Principle 7 = Integrity (justify trust) · Principle 8 = Public trust & confidence</div>
<h3>Supporting NCNZ Guidelines</h3>
<ul>
  <li><strong>Guidelines: Professional Boundaries (2012)</strong> — discusses the sometimes challenging but critical issue of professional boundaries in more detail; designed to be read alongside the Code; the key message is that nurses must make the care of patients their FIRST CONCERN</li>
  <li><strong>Guidelines: Social Media & Electronic Communication (2012)</strong> — guidance on online conduct; of the 8 Code principles, FOUR directly intersect with social media use</li>
</ul>
`},
  {id:"social",title:"Social Media, Confidentiality & Competence",lo:"LO4",html:`
<h3>Why Maintain Professional Boundaries on Social Media?</h3>
<ul>
  <li><strong>Protect patient privacy and confidentiality</strong> — patients don't have to be named to be identifiable; even vague comments can unintentionally identify a patient; deleted content may remain accessible; breaching confidentiality can result in complaints to the Nursing Council, Privacy Commissioner, or legal action</li>
  <li><strong>Uphold public trust in the nursing profession</strong> — nurses are always seen as nurses, on and off duty; traditional professional standards still apply in the online context (NZNO, 2019)</li>
  <li><strong>Avoid blurring personal and professional roles</strong> — 'friending' patients creates dual relationships; a power imbalance exists between nurses and patients; boundary violations can result in disciplinary action</li>
  <li><strong>Maintain safe, ethical, culturally respectful practice</strong> — posts can be misinterpreted; nurses have an obligation to establish and enforce professional boundaries in the online environment</li>
</ul>
<h3>Key Social Media Rules — NZNO (2019) General Principles</h3>
<ul>
  <li>You have an ethical and <strong>legal obligation</strong> to maintain patient/client privacy and confidentiality at all times</li>
  <li><strong>NEVER</strong> transmit any patient-related image or information that may violate confidentiality or privacy, or degrade or embarrass the patient</li>
  <li>Do not identify patients by name or post information that may lead to identification — <strong>limiting access through privacy settings is NOT sufficient</strong></li>
  <li>Never refer to patients in a disparaging manner, even if not identified</li>
  <li>Maintain professional boundaries online — as with face-to-face, the nurse has an obligation to establish, communicate and enforce professional boundaries with patients</li>
  <li>Use caution with online social contact with current or former patients — it may be prudent to <strong>avoid such contact</strong></li>
  <li>Promptly <strong>report any breach</strong> of confidentiality or privacy</li>
  <li>Do NOT make disparaging comments about employers, co-workers, teachers or fellow students online</li>
</ul>
<h3>Real Consequences (Module 1 — NZNO 2019)</h3>
<div class="highlight"><strong>Carolyn Strom case:</strong> Canadian nurse disciplined and fined $1,000 plus $25,000 in hearing costs by the Saskatchewan Registered Nurses Association after a 2015 Facebook post criticising end-of-life care her grandfather received — even while on parental leave and posting on her personal page. Appeal upheld in 2018. Key lesson: professional standards apply at all times, online and offline.</div>
<h3>Defamation</h3>
<p>Defamation cases may be brought in a court of law and are <strong>civil claims</strong> in which substantial monetary compensation can be awarded. A defamatory statement: (1) is published to a third person, (2) identifies a subject, and (3) damages the reputation of the subject. Be mindful of comments about colleagues, employers, and large organisations. (Module 1)</p>
<h3>Duty of Confidentiality</h3>
<p>A nurse must <strong>protect all private information</strong> about a health consumer and only share it when necessary for their care or required by law.</p>
<ul>
  <li>Keep patient information private — NOT in hallways, lifts, cafeterias, or online</li>
  <li>Share only on a <strong>"need-to-know" basis</strong> with health professionals involved in care</li>
  <li>Follow the Code of Conduct, Privacy Act, and Health Information Privacy Code</li>
  <li>The anonymity potentially afforded online is <strong>no excuse</strong> for breaching confidentiality</li>
</ul>
<h3>Responding to Tasks Beyond Your Competence</h3>
<ul>
  <li><strong>1. Speak up early</strong> — clearly state you don't feel competent or confident; prevents unsafe practice and shows accountability</li>
  <li><strong>2. Explain professionally</strong> — "I haven't been trained, assessed, or supervised in this skill yet" (aligns with integrity)</li>
  <li><strong>3. Seek support</strong> — ask for supervision, additional teaching, or to observe first</li>
  <li><strong>4. Ensure safe care</strong> — make sure a competent nurse or clinician takes over; protects the patient and meets legal and ethical obligations</li>
  <li><strong>5. Reflect and plan</strong> — arrange training to develop the skill; supports ongoing professional development (Pou 6.3)</li>
</ul>
<div class="warn">⚠️ Links to Principle 4 (maintain health consumer trust by providing safe and competent care), the value of Integrity, HPCAA 2003 section 16 (fitness to practise), and Pou 4.11 (works within limits of expertise).</div>
`},
  {id:"fopd",title:"FOPD Professionalism — Core Topics",lo:"FOPD",html:`
<h3>🌿 Four Core Values of the NCNZ Code of Conduct</h3>
<ul>
  <li><strong>Respect</strong> — valuing the dignity, privacy, and individuality of every health consumer in all interactions</li>
  <li><strong>Trust</strong> — acting in ways that maintain the public's confidence in nurses and the nursing profession</li>
  <li><strong>Partnership</strong> — working alongside health consumers, whānau, and communities to support shared decision-making and culturally safe care</li>
  <li><strong>Integrity</strong> — being honest, accountable, and acting ethically in all professional interactions</li>
</ul>
<h3>🌐 Social Media & Professional Boundaries</h3>
<p>A nurse must maintain professional boundaries on social media because:</p>
<ul>
  <li><strong>Protect patient privacy and confidentiality</strong> — patients don't have to be named to be identifiable; privacy settings are NOT sufficient; deleted content may remain accessible (NZNO, 2019)</li>
  <li><strong>Uphold public trust in the nursing profession</strong> — nurses are always seen as nurses, on and off duty; professional standards always apply online</li>
  <li><strong>Avoid blurring personal and professional roles</strong> — 'friending' patients creates dual relationships; a power imbalance exists and maintenance of clear professional boundaries protects patients from exploitation</li>
  <li><strong>Maintain safe, ethical, and culturally respectful practice</strong> — the nurse has an obligation to establish, communicate and enforce professional boundaries in the online environment</li>
</ul>
<h3>🔒 Duty of Confidentiality</h3>
<p>A nurse must protect all private information about a health consumer and only share it when necessary for their care or required by law. The anonymity potentially afforded online is no excuse for breaching confidentiality. Breaching confidentiality erodes public trust and can result in complaints to the Nursing Council, Privacy Commissioner, or legal action.</p>
<ul>
  <li><strong>Keep patient information private</strong> — anything learned through your role must not be shared with uninvolved parties</li>
  <li><strong>Need-to-know basis</strong> — only share with health professionals who need it for safe, effective care</li>
  <li><strong>Communicate respectfully and securely</strong> — not in hallways, lifts, cafeterias, or online</li>
  <li><strong>Follow legal and ethical requirements</strong> — Code of Conduct, Privacy Act, Health Information Privacy Code</li>
</ul>
<h3>🩺 Responding to Tasks Beyond Your Competence</h3>
<ul>
  <li><strong>1. Acknowledge and speak up early</strong> — state you do not feel competent or confident; prevents unsafe practice; demonstrates accountability</li>

  <li><strong>3. Seek guidance, supervision, or support</strong> — ask for supervision, teaching, or to observe; shows commitment to learning while keeping patients safe</li>
  <li><strong>4. Ensure the task is completed safely</strong> — if unable to perform safely, ensure a competent nurse or clinician takes over; protects the patient; meets legal and ethical obligations</li>
  <li><strong>5. Reflect and plan to build competence</strong> — arrange training or practice to develop the skill; supports ongoing professional development (Pou 6.3)</li>
</ul>
<h3>🌱 The Role of Self-Reflection in NZ Nursing Professionalism</h3>

  <li><strong>Strengthens professional identity and growth</strong> — part of ongoing professional development (Pou 6.3); understand how values and experiences shape practice</li>
  <li><strong>Supports ethical and compassionate care</strong> — encourages empathy, emotional awareness, and integrity — all key Code of Conduct values</li>
</ul>
<div class="memory-aid">💡 <strong>Exam tip:</strong> These five topics directly match the SAQ questions in the FOPD Professionalism summative. Structure your answers: define the concept → give reasons/steps → link to the Code of Conduct values and/or relevant legislation and NCNZ competency descriptors (six pou).</div>

  {id:1,lo:"LO2",q:"What is the NCNZ definition of competence? Break down its five components.",model:"According to NCNZ (2022), competence is the combination of skills, knowledge, attitudes, values and abilities that underpin effective performance as a nurse. Knowledge includes nursing knowledge, anatomy and physiology, social science, environmental science, behavioural science and pharmacology. Skills include communication (the number one skill), assessment skills and technological abilities — nurses can have hindrances such as pre-occupation with personal affairs or making assumptions about patient motivation. Attitudes include caring and compassion, which Watson (2008) describes as a mutually beneficial experience for both the patient and the nurse. Professional values include Respect, Trust, Partnership and Integrity (NCNZ), while noting that conflict can arise between personal and professional values. Abilities include critical thinking, time management, leadership and willingness to learn."},
  {id:2,lo:"LO2",q:"Explain the difference between a therapeutic relationship and a social relationship.",model:"A therapeutic relationship is goal-directed, focused on improving the client's health outcomes, and has a defined timeframe — it begins with the start of care and ends at discharge or when care goals are met. The client's needs always take priority over the nurse's, there is a strict expectation of confidentiality that is legally and ethically required, and a power imbalance exists because the nurse holds knowledge and authority. A social relationship, in contrast, is mutual and ongoing, exists for both parties' enjoyment, has no formal boundaries or power imbalance, and confidentiality expectations are informal. The nurse is always responsible for maintaining professional boundaries in the therapeutic relationship. The relationship ends when the therapeutic relationship ends — when goals are met or the patient is discharged — regardless of the length of the relationship."},
  {id:3,lo:"LO2",q:"What are professional boundaries and why are they important?",model:"Professional boundaries are the spaces between the nurse's power and the client's vulnerability. They are imposed by ethical, legal and professional standards of nursing. They are essential because the nurse holds a position of power and trust — power through knowledge, access to personal information, and authority over aspects of care. Without clear boundaries, there is a risk of over-involvement (losing objectivity; the nurse's personal feelings interfere with professional judgement) or under-involvement (being emotionally absent; cutting corners in care; dehumanising the client). The nurse is ALWAYS responsible for maintaining these boundaries, regardless of how the client behaves. Boundary violations can result in disciplinary action from the NCNZ, including suspension or conditions placed on scope of practice. The key message is that nurses must make the care of patients their FIRST CONCERN."},
  {id:4,lo:"LO2",q:"What is burnout in nursing? What causes it and how can it be prevented?",model:"Burnout occurs when a nurse is physically, emotionally and spiritually exhausted due to insufficient rest and self-care. Signs include constant fatigue, feeling overworked or under-appreciated, lack of enthusiasm about work, and compassion fatigue. The effects of burnout are serious — it results in impaired attention, memory, and decision-making, which leads to decreased recall, attention to detail, poor patient care and compromised patient health outcomes. To prevent burnout, nurses should engage in professional self-care, which is the awareness to maintain professional boundaries and care for yourself effectively. Strategies include mindfulness, supervision, exercise, diet, time management, maintaining family and friend networks, and debriefing with colleagues after highly emotional shifts. Burnout is recognised as an occupational hazard for nurses (Module 2 / Module 5)."},
  {id:5,lo:"LO2",q:"Describe Benner's Novice to Expert model. How does it relate to the PDRP?",model:"Benner's Novice to Expert model identifies five stages of clinical skill development. The novice is a beginner who relies on rule-based practice. The advanced beginner begins to formulate principles based upon experience to guide actions. The competent practitioner plans actions based on analytic thinking and is efficient and organised. The proficient practitioner uses holistic decision-making and can modify plans based on experience. The expert nurse demonstrates intuitive knowing in clinical decision situations and is flexible and highly proficient. All PDRP (Professional Development Recognition Programme) in New Zealand is modelled on Benner's novice to expert model, recognising that experience is not a time-based activity but develops with education and research (Module 1)."},
  {id:6,lo:"LO4",q:"What is the HPCAA 2003 and what does it require of nurses and the Nursing Council?",model:"The Health Practitioners Competence Assurance Act 2003 (HPCAA) is the overarching law governing all health professions in New Zealand. Its purpose is to protect the health and safety of the public. Under section 118(i), the NCNZ is required to set standards of competence and ethical conduct for nurses — the Code of Conduct outlines the standards of behaviour that nurses are expected to uphold in their professional practice. Section 16 of the HPCAA specifies that all candidates for registration as a nurse must meet the criteria for fitness to practise. Nursing students must disclose criminal convictions that may prevent their registration, and the Vulnerable Children Act 2014 also requires disclosure of relevant information known to police. (Module 1 / Module 5)"},
  {id:7,lo:"LO4",q:"What is the difference between NCNZ and NZNO?",model:"NCNZ (Nursing Council of New Zealand) is the regulatory authority established under the HPCAA 2003, and its primary purpose is to protect the health and safety of the public. It sets standards of competence, scopes of practice, and the Code of Conduct, and has the power to register, discipline, and deregister nurses. It also publishes guidelines on professional boundaries and social media and electronic communication. NZNO (New Zealand Nurses Organisation) is a professional body and union that advocates for nurses' employment rights and professional interests. It publishes the Code of Ethics (NZNO, 2010) and standards of nursing practice (NZNO, 2012), and membership is voluntary. In summary: NCNZ protects the public; NZNO supports nurses. Both organisations set professional standards, but only NCNZ has regulatory and disciplinary authority. (Module 1 / Module 5)"},
  {id:8,lo:"LO4",q:"Name four of the eight principles of the NCNZ Code of Conduct. How do they guide nursing practice?",model:"The eight principles of the NCNZ Code of Conduct are of equal importance and are based on the four core values of respect, trust, partnership and integrity. Principle 1 (respect the dignity and individuality of health consumers) means valuing each person as an individual in all interactions and care. Principle 4 (maintain health consumer trust by providing safe and competent care) requires nurses to practise within their competence and speak up when unable to perform a task safely. Principle 5 (respect health consumers' privacy and confidentiality) means protecting all patient information and sharing it only on a need-to-know basis, which extends to not discussing patients in hallways or online. Principle 8 (maintain public trust and confidence in the nursing profession) means nurses are always seen as nurses — on and off duty — and their personal and online conduct reflects on the entire profession. These principles together create the framework for ethical, safe and professional nursing conduct. (Module 2 / Module 5)"},
  {id:9,lo:"LO4",q:"Why must nurses maintain professional boundaries on social media? Give four reasons with reference to legislation or guidelines.",model:"First, nurses have an ethical and legal obligation to maintain patient confidentiality at all times, and online posts — even with privacy settings — can unintentionally identify a patient through a combination of information; breaching confidentiality can result in complaints to the Nursing Council, Privacy Commissioner, or legal action (Privacy Act; NZNO 2019 Guidelines). Second, nurses must uphold public trust in the profession — nurses are always seen as nurses on and off duty, and unprofessional posts on personal accounts can damage confidence in the profession (Principle 8 of the Code of Conduct). Third, connecting with patients online (such as 'friending' them on social media) creates dual relationships and risks boundary violations — a power imbalance exists between nurses and patients and maintenance of clear professional boundaries protects patients from exploitation (NCNZ Guidelines: Professional Boundaries, 2012). Fourth, the Harmful Digital Communications Act 2015 sets 10 principles for digital communications, meaning threatening, offensive or harassing online conduct can have legal consequences beyond professional disciplinary proceedings. (Module 1 / Module 5)"},
  {id:10,lo:"LO4",q:"What should a nurse do if asked to perform a task they do not feel competent to do?",model:"The nurse should first speak up early and clearly state that they do not feel competent or confident to perform the task — this prevents unsafe practice and demonstrates accountability. They should explain professionally that they have not been trained, assessed, or supervised in the skill, which aligns with the Code of Conduct value of integrity. They should then seek guidance by asking for supervision while performing the task, additional teaching, or the opportunity to observe first — this shows commitment to learning while keeping patients safe. If they cannot perform the task safely, they must ensure a competent nurse or clinician takes over, which protects the patient and meets legal and ethical obligations (HPCAA 2003, section 16). Afterward, the nurse should reflect on the experience and arrange training or practice to develop the skill, supporting ongoing professional development in line with Pou 6.3 (continuous learning) and Pou 4.11 (works within limits of expertise) from the NCNZ Standards of Competence 2025. (Module 1 / Module 6)"},
];
